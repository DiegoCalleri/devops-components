# Example: full pipeline — build/push to GHCR, then deploy to VPS via SSH + docker compose
#
# Prerequisites on the VPS:
#   1. Docker and docker compose installed
#   2. Copy deploy/docker-compose.yml from devops-components to /opt/myapp/docker-compose.yml
#   3. Create /opt/myapp/.env with runtime variables
#
# GitHub secrets required:
#   SSH_HOST, SSH_USER, SSH_KEY
#   GITHUB_TOKEN is used for GHCR (packages:write)

name: Build and Deploy Next.js

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  push-image:
    uses: DiegoCalleri/devops-components/.github/workflows/push-image.yml@v1
    with:
      app-type: nextjs
      image-name: ${{ github.repository }}
      registry: ghcr
      build-args: |
        NEXT_PUBLIC_API_URL=https://api.example.com
    secrets:
      REGISTRY_USERNAME: ${{ github.actor }}
      REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: push-image
    uses: DiegoCalleri/devops-components/.github/workflows/deploy-image.yml@v1
    with:
      image-ref-mode: uri
      image-uri: ${{ needs.push-image.outputs.image-uri }}
      working-directory: /opt/myapp
      compose-path: /opt/myapp/docker-compose.yml
      env-file-path: /opt/myapp/.env
      env-content: |
        NEXT_PUBLIC_API_URL=https://api.example.com
      force-recreate: true
      # debug: true # enable temporarily when investigating deploy issues
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
      # ENV_CONTENT: ${{ secrets.ENV_CONTENT }}
      REGISTRY_USERNAME: ${{ github.actor }}
      REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
