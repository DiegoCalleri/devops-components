# Example: deploy Go API to GHCR
#
# Copy this file to your Go backend repo:
#   .github/workflows/deploy.yml
#
# Prerequisites:
#   1. Copy docker/go.Dockerfile from devops-components to your repo root as Dockerfile
#   2. Adjust MAIN_PACKAGE in workflow build-args if your entry point differs
#   3. Add a /health endpoint for the HEALTHCHECK

name: Deploy Go API

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  push-image:
    uses: DiegoCalleri/devops-components/.github/workflows/push-image.yml@v1
    with:
      app-type: go
      image-name: ${{ github.repository }}
      registry: ghcr
      build-args: |
        MAIN_PACKAGE=./cmd/server
    secrets:
      REGISTRY_USERNAME: ${{ github.actor }}
      REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
