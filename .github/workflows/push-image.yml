name: Push Docker Image

on:
  workflow_call:
    inputs:
      app-type:
        description: Application preset — nextjs, nodejs, or go
        required: true
        type: string
      image-name:
        description: Image name without registry prefix (e.g. my-org/my-app)
        required: true
        type: string
      registry:
        description: Registry preset — ghcr, ecr, ycr, or custom
        required: false
        type: string
        default: ghcr
      registry-url:
        description: Custom registry URL (required when registry=custom)
        required: false
        type: string
        default: ""
      dockerfile:
        description: Override Dockerfile path (defaults to app-type preset)
        required: false
        type: string
        default: ""
      context:
        description: Docker build context
        required: false
        type: string
        default: .
      tags:
        description: Comma-separated image tags
        required: false
        type: string
        default: ""
      build-args:
        description: Additional build-args (KEY=VALUE per line)
        required: false
        type: string
        default: ""
      platforms:
        description: Target platforms
        required: false
        type: string
        default: linux/amd64
      push:
        description: Push image to registry
        required: false
        type: boolean
        default: true
    secrets:
      REGISTRY_USERNAME:
        required: false
      REGISTRY_PASSWORD:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      AWS_REGION:
        required: false
      YC_SA_JSON_CREDENTIALS:
        required: false
      YC_REGISTRY_ID:
        required: false
    outputs:
      image-uri:
        description: Full image URI with the first tag
        value: ${{ jobs.export-uri.outputs.image-uri }}
      image-digest:
        description: Image digest (sha256)
        value: ${{ jobs.push.outputs.image-digest }}
      image-tags:
        description: Comma-separated list of pushed tags
        value: ${{ jobs.export-uri.outputs.image-tags }}

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.image-digest }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Resolve Dockerfile
        id: dockerfile
        shell: bash
        run: |
          if [ -n "${{ inputs.dockerfile }}" ]; then
            DOCKERFILE="${{ inputs.dockerfile }}"
          else
            case "${{ inputs.app-type }}" in
              nextjs)
                DOCKERFILE="Dockerfile"
                if [ ! -f "$DOCKERFILE" ]; then
                  echo "::warning::Dockerfile not found in caller repo. Copy docker/nextjs.Dockerfile from devops-components."
                fi
                ;;
              nodejs)
                DOCKERFILE="Dockerfile"
                if [ ! -f "$DOCKERFILE" ]; then
                  echo "::warning::Dockerfile not found in caller repo. Copy docker/nodejs.Dockerfile from devops-components."
                fi
                ;;
              go)
                DOCKERFILE="Dockerfile"
                if [ ! -f "$DOCKERFILE" ]; then
                  echo "::warning::Dockerfile not found in caller repo. Copy docker/go.Dockerfile from devops-components."
                fi
                ;;
              *)
                echo "::error::Unknown app-type: ${{ inputs.app-type }}. Use 'nextjs', 'nodejs', or 'go'."
                exit 1
                ;;
            esac
          fi
          echo "path=${DOCKERFILE}" >> "$GITHUB_OUTPUT"

      - name: Resolve image tags
        id: tags
        shell: bash
        run: |
          if [ -n "${{ inputs.tags }}" ]; then
            echo "value=${{ inputs.tags }}" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            echo "value=latest,sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve build args
        id: build-args
        shell: bash
        run: |
          ARGS=""
          case "${{ inputs.app-type }}" in
            nextjs)
              ARGS="NODE_ENV=production"
              ;;
            nodejs)
              ARGS="NODE_ENV=production"
              ;;
            go)
              ARGS="CGO_ENABLED=0"
              ;;
          esac

          if [ -n "${{ inputs.build-args }}" ]; then
            if [ -n "$ARGS" ]; then
              ARGS="${ARGS}"$'\n'"${{ inputs.build-args }}"
            else
              ARGS="${{ inputs.build-args }}"
            fi
          fi

          {
            echo "value<<EOF"
            echo "$ARGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build
        uses: DiegoCalleri/devops-components/actions/build-and-push@v1
        with:
          image-name: ${{ inputs.image-name }}
          registry: ${{ inputs.registry }}
          registry-url: ${{ inputs.registry-url }}
          tags: ${{ steps.tags.outputs.value }}
          dockerfile: ${{ steps.dockerfile.outputs.path }}
          context: ${{ inputs.context }}
          build-args: ${{ steps.build-args.outputs.value }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          registry-username: ${{ secrets.REGISTRY_USERNAME }}
          registry-password: ${{ secrets.REGISTRY_PASSWORD }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          yc-registry-id: ${{ secrets.YC_REGISTRY_ID }}

  export-uri:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [push]
    outputs:
      image-uri: ${{ steps.export.outputs.image-uri }}
      image-tags: ${{ steps.export.outputs.image-tags }}
    steps:
      - name: Export image URI (no secrets)
        id: export
        shell: bash
        run: |
          # Compute tags exactly like in the push job, but without using secrets.
          if [ -n "${{ inputs.tags }}" ]; then
            TAGS="${{ inputs.tags }}"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            TAGS="latest,sha-${SHORT_SHA}"
          fi

          FIRST_TAG=$(echo "$TAGS" | tr ',' '\n' | head -n1 | xargs)

          IMAGE_URI=""
          case "${{ inputs.registry }}" in
            ghcr)
              REGISTRY_URL="ghcr.io"
              IMAGE_URI="${REGISTRY_URL}/${{ inputs.image-name }}:${FIRST_TAG}"
              ;;
            custom)
              if [ -z "${{ inputs.registry-url }}" ]; then
                echo "::error::registry-url is required when registry=custom"
                exit 1
              fi
              REGISTRY_URL="${{ inputs.registry-url }}"
              REGISTRY_URL="${REGISTRY_URL%/}"
              IMAGE_URI="${REGISTRY_URL}/${{ inputs.image-name }}:${FIRST_TAG}"
              ;;
            ecr|ycr)
              # In this v1 we intentionally don't export image-uri for ECR/YCR
              # because registry host may require credentials/secret values.
              IMAGE_URI=""
              ;;
            *)
              echo "::error::Unknown registry: ${{ inputs.registry }}"
              exit 1
              ;;
          esac

          echo "image-uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "image-tags=${TAGS}" >> "$GITHUB_OUTPUT"
